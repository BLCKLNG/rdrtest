<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body style="margin:0; background:transparent; overflow:hidden; width:2560px; height:1440px; position:relative;">
  <!-- If you see THIS text in Live Studio, HTML is loading -->
  <div style="position:fixed; left:16px; top:16px; color:rgba(255,255,255,0.25); font:700 18px system-ui; z-index:9999; pointer-events:none;">
    OVERLAY LOADED
  </div>

  <div id="wrap"
    style="position:absolute; left:0; right:0; bottom:53px; display:flex; justify-content:center; pointer-events:none;">
    <div id="carpet"
      style="
        position:relative;
        width:1440px;
        height:240px;
        border-radius:53px;
        background: linear-gradient(180deg,#7a0f1f 0%,#5a0c17 45%,#3d0810 100%);
        border:6px solid #d4af37;
        box-shadow: 0 0 30px rgba(120,0,40,0.45), 0 0 80px rgba(60,0,20,0.35);
        display:flex;
        align-items:center;
        justify-content:center;
        padding-left:40px;
        padding-right:40px;
      ">
      <div id="icons"
        style="
          display:flex;
          align-items:center;
          justify-content:center;
          gap:24px;
          white-space:nowrap;
          opacity:1;
          transition: opacity 1000ms linear;
          will-change: opacity;
        "></div>
    </div>
  </div>

  <script>
    // If Live Studio blocks inline JS, you will still see the carpet + "OVERLAY LOADED"
    const V_IMG = 1;

    const pages = [
      ["HEAL.png","KICKFLIP.png","ENEMY.png","SPIN.png","SLEEP.png"],
      ["VAMPIRE.png","PREDATOR.png","SOLDIER.png","HORSE.png","DANCE.png"],
      ["KACHOW.png","FLY.png","THROW.png","SKYRIM.png","SKYFALL.png"],
      ["RWEAPON.png","REVOLVER.png","DWARF.png","GRAVITY.png","DOOMSDAY.png"]
    ];
    const files = pages.flat();

    const FADE_MS = 1000;
    const IDLE_MS = 8000;

    const iconsEl = document.getElementById("icons");
    const carpetEl = document.getElementById("carpet");

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function attachFallback(img, name){
      const base = name.replace(/\.[^.]+$/, "");
      const ext  = (name.match(/\.([^.]+)$/) || ["","png"])[1].toLowerCase();
      const candidates = [
        name, base + "." + ext.toUpperCase(), base + ".png", base + ".PNG",
        base + ".jpg", base + ".JPG", base + ".jpeg", base + ".JPEG",
        base + ".webp", base + ".WEBP"
      ];
      let k = 0;
      img.onerror = () => {
        k++;
        if (k >= candidates.length) { img.style.display = "none"; return; }
        img.src = "images/" + candidates[k] + "?v=" + V_IMG;
      };
    }

    async function preloadImages(){
      const uniq = [...new Set(files)];
      await Promise.all(uniq.map(name => {
        const img = new Image();
        attachFallback(img, name);
        img.src = "images/" + name + "?v=" + V_IMG;
        return img.decode ? img.decode().catch(()=>{}) : Promise.resolve();
      }));
    }

    function renderPage(list){
      iconsEl.innerHTML = "";
      for (const name of list){
        const img = document.createElement("img");
        img.alt = name;
        img.decoding = "async";
        img.loading = "eager";
        img.style.height = "200px";
        img.style.width = "auto";
        img.style.display = "block";
        img.style.filter =
          "drop-shadow(0 14px 24px rgba(0,0,0,0.65)) drop-shadow(0 0 14px rgba(0,0,0,0.30))";
        img.style.backfaceVisibility = "hidden";
        img.style.transform = "translateZ(0)";
        attachFallback(img, name);
        img.src = "images/" + name + "?v=" + V_IMG;
        iconsEl.appendChild(img);
      }
    }

    async function setCarpetWidthFor40pxSides(){
      let widest = 0;
      for (const page of pages){
        renderPage(page);
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        widest = Math.max(widest, iconsEl.scrollWidth);
      }
      const target = Math.ceil(widest + 80);
      carpetEl.style.width = target + "px";
    }

    async function cycle(){
      let idx = 0;
      renderPage(pages[idx]);

      while(true){
        await sleep(IDLE_MS);

        iconsEl.style.opacity = "0";
        await sleep(FADE_MS);

        idx = (idx + 1) % pages.length;
        renderPage(pages[idx]);

        requestAnimationFrame(() => iconsEl.style.opacity = "1");
        await sleep(FADE_MS);
      }
    }

    (async function init(){
      await preloadImages();
      await setCarpetWidthFor40pxSides();
      cycle();
    })();
  </script>
</body>
</html>
